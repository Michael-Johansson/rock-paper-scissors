<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrapper">
      <h1 class="heading">Rock Paper Scissors</h1>
      <div class="container">
        <h1 class="result">You win!</h1>
          <div class="selections">
          <span class="player-score">Your score<br> <span class="p-score">3</span>
            <h1 class="player-choice">✌️</h1></span
          ><span class="computer-score">Computer score<br> <span class="c-score">5</span>
            <h1 class="computer-choice">✊</h1>
          </span>
        </div>
        <div class="player-choices">
          <button class="rock btn">Rock</button>
          <button class="paper btn">Paper</button>
          <button class="scissors btn">Scissors</button>
        </div>
      </div>
      </div>
    </div>
  </body>
</html>
