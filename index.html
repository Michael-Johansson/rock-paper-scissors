<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Just your average Rock Paper Scissors game!"
    />
    <title>Rock Paper Scissors</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100;200;400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="wrapper wrapper-hidden">
      <h1 class="heading">Rock Paper Scissors</h1>
      <div class="selections">
        <div class="selection">
          <img
            id="player-choice"
            class="player-hide player-active"
            src="images/rock.png"
          />
          <span
            >Your Score<br />
            <span class="player-score">0</span></span
          >
        </div>
        <div class="selection">
          <img
            id="computer-choice"
            class="computer-hide computer-active"
            src="images/paper.png"
          />
          <span
            >Computer Score<br/>
            <span class="computer-score">0</span></span
          >
        </div>
      </div>
      <div class="player-buttons">
        <button class="btn button" id="rock">Rock</button>
        <button class="btn button" id="paper">Paper</button>
        <button class="btn button" id="scissors">Scissors</button>
      </div>
      <div id="bottom-tag">
      <p>Made with <div id="heart">❤️</div> by <a href="https://github.com/Michael-Johansson">Michael</a><img id="logo" src="images/github-icon.png"></p>
    </div>
    </div>
  </body>
</html>
