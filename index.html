<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrapper wrapper-hidden">
      <h1 class="heading">Rock Paper Scissors</h1>
      <div class="selections">
        <div class="selection">
          <img
            id="player-choice"
            class="player-hide player-active"
            src="/images/rock.png"
            alt=""
          />
          <span
            >Your Score<br />
            <span class="player-score">0</span></span
          >
        </div>
        <div class="selection">
          <img
            id="computer-choice"
            class="hide active"
            src="/images/scissors.png"
            alt=""
          />
          <span
            >Computer Score<br />
            <span class="computer-score">0</span></span
          >
        </div>
      </div>
      <div class="player-buttons">
        <button class="btn" id="rock">Rock</button>
        <button class="btn" id="paper">Paper</button>
        <button class="btn" id="scissors">Scissors</button>
      </div>
    </div>
  </body>
</html>
